site_name: "City of Exiles"
site_url: "https://argvader.github.io/city_of_exiles/"
theme:
  name: material
  palette:
    - scheme: slate
      primary: deep purple
      accent: purple
  font:
    text: Noto Serif
    code: Fira Mono
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.sections
    - navigation.expand
    - navigation.top
    - toc.follow
    - search.highlight

nav:
  - Home: index.md
  - Sessions:
    - sessions/2026-06-04.md
    - sessions/2026-06-04.md
  - Wiki:
    - Player Characters:
      - wiki/pcs/dungeon-master.md
      - wiki/pcs/seraphina-voss.md