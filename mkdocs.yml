site_name: "City of Exiles"
site_url: "https://argvader.github.io/city_of_exiles/"
theme:
  name: material
  palette:
    - scheme: default
      primary: amber
      accent: deep orange
  font:
    text: Marcellus
    code: Fira Mono
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.sections
    - navigation.expand
    - navigation.top
    - toc.follow
    - search.highlight

nav:
  - Home: index.md
  - Sessions:
    - sessions/2026-06-04.md
    - sessions/2026-06-04.md
  - Wiki:
    - Player Characters:
      - wiki/pcs/seraphina-voss.md
    - NPCs:
      - wiki/npcs/the-enigmatic-ally.md
    - Locations:
      - wiki/locations/labyrinthine-archives.md