site_name: "City of Exiles"
site_url: "https://argvader.github.io/city_of_exiles/"

theme:
  name: material
  custom_dir: overrides
  logo: assets/logo.svg
  favicon: assets/logo.svg
  icon:
    logo: material/eye-outline
  palette:
    # Dark "basalt & gold" — default.
    - scheme: slate
      primary: black
      accent: amber
      toggle:
        icon: material/weather-sunny
        name: Switch to sandstone (light)
    # Light "sandstone" scheme.
    - scheme: default
      primary: amber
      accent: deep orange
      toggle:
        icon: material/weather-night
        name: Switch to basalt (dark)
  font:
    text: Marcellus
    code: Fira Mono
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.sections
    - navigation.expand
    - navigation.top
    - toc.follow
    - search.highlight

extra_css:
  - stylesheets/extra.css

hooks:
  - hooks/wiki_images.py

markdown_extensions:
  - attr_list
  - md_in_html
  - admonition
  - tables
  - toc:
      permalink: true
  - pymdownx.superfences

nav:
  - Home: index.md
  - Sessions:
      - "Session One — The Tidewater Amulet (2026-07-03)": sessions/2026-07-03.md
  - Wiki:
      - Player Characters:
          - wiki/pcs/adarius.md
          - wiki/pcs/behnsun-payne.md
          - wiki/pcs/fizz.md
          - wiki/pcs/krum.md
          - wiki/pcs/prance-galavant.md
      - NPCs:
          - wiki/npcs/nybora-tidewater.md
          - wiki/npcs/the-amulet-speaker.md
          - wiki/npcs/frederick.md
          - wiki/npcs/major-jamieson.md
          - wiki/npcs/charles-dammit.md
          - wiki/npcs/seris.md
          - wiki/npcs/glidershade.md
          - wiki/npcs/paddy-greenfoot.md
          - wiki/npcs/the-dragonborn-band.md
          - wiki/npcs/dalen-marr.md
      - Factions:
          - wiki/factions/city-guard-of-utsa-paradisa.md
      - Locations:
          - wiki/locations/utsa-paradisa.md
          - wiki/locations/the-slums.md
          - wiki/locations/the-jade-district.md
          - wiki/locations/the-water-temple.md
          - wiki/locations/the-university.md
          - wiki/locations/the-bazaar.md
