site_name: "City of Exiles"
site_url: "https://argvader.github.io/city_of_exiles/"
theme:
  name: material
  palette:
    - scheme: default
      primary: amber
      accent: deep orange
  font:
    text: Marcellus
    code: Fira Mono
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.sections
    - navigation.expand
    - navigation.top
    - toc.follow
    - search.highlight

nav:
  - Home: index.md
  # Add each new session under Sessions as it is published, e.g.:
  # - Sessions:
  #     - "Session One (2026-06-04)": sessions/2026-06-04.md
  # Add wiki entries under their category as they are created, e.g.:
  # - Wiki:
  #     - Player Characters:
  #         - wiki/pcs/some-pc.md
  #     - NPCs:
  #         - wiki/npcs/some-npc.md
  #     - Factions:
  #         - wiki/factions/some-faction.md
  #     - Locations:
  #         - wiki/locations/some-location.md